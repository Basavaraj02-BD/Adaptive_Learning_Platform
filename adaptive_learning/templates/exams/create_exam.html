{% extends 'base.html' %}
{% block title %}Create Exam{% endblock %}
{% block content %}
<div class="container py-4" style="max-width:650px;">
    <div class="card p-4">
        <h4 class="fw-bold mb-4">
            <i class="fas fa-plus me-2 text-danger"></i>Create New Exam
        </h4>
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-semibold">Exam Title</label>
                <input type="text" name="title" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Course</label>
                <select name="course" class="form-select" required>
                    <option value="">-- Select Course --</option>
                    {% for course in courses %}
                    <option value="{{ course.pk }}">{{ course.title }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">Exam Type</label>
                    <select name="exam_type" class="form-select">
                        <option value="mcq">Multiple Choice</option>
                        <option value="true_false">True / False</option>
                        <option value="mixed">Mixed</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">Duration (minutes)</label>
                    <input type="number" name="duration_min" class="form-control" value="60" required>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">Total Marks</label>
                    <input type="number" name="total_marks" class="form-control" value="100" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">Pass Marks</label>
                    <input type="number" name="pass_marks" class="form-control" value="40" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Start Date & Time</label>
                <input type="datetime-local" name="start_time" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">End Date & Time</label>
                <input type="datetime-local" name="end_time" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-danger w-100 btn-lg">
                <i class="fas fa-arrow-right me-2"></i>Create & Add Questions
            </button>
        </form>
    </div>
</div>
{% endblock %}
