{% extends 'base.html' %}
{% block title %}Login — LearnSmart{% endblock %}
{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center">
    <div class="card p-4" style="width:420px;">
        <div class="text-center mb-4">
            <i class="fas fa-graduation-cap fa-3x text-primary"></i>
            <h3 class="mt-2 fw-bold">Welcome Back!</h3>
            <p class="text-muted">Login to your account</p>
        </div>
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-semibold">Username</label>
                <input type="text" name="username" class="form-control form-control-lg" placeholder="Enter username" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Password</label>
                <input type="password" name="password" class="form-control form-control-lg" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 btn-lg mt-2">
                <i class="fas fa-sign-in-alt me-2"></i>Login
            </button>
        </form>
        <p class="text-center mt-3 mb-0">
            Don't have an account? <a href="{% url 'register' %}">Register here</a>
        </p>
    </div>
</div>
{% endblock %}
