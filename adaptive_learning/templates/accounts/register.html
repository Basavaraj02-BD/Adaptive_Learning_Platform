{% extends 'base.html' %}
{% block title %}Register — LearnSmart{% endblock %}
{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center py-4">
    <div class="card p-4" style="width:480px;">
        <div class="text-center mb-4">
            <i class="fas fa-user-plus fa-3x text-primary"></i>
            <h3 class="mt-2 fw-bold">Create Account</h3>
        </div>
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-semibold">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Choose a username" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Email</label>
                <input type="email" name="email" class="form-control" placeholder="Enter email" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Phone</label>
                <input type="text" name="phone" class="form-control" placeholder="Enter phone number">
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Role</label>
                <select name="role" class="form-select" required>
                    <option value="">-- Select Role --</option>
                    <option value="student">Student</option>
                    <option value="teacher">Teacher</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Password</label>
                <input type="password" name="password1" class="form-control" placeholder="Create password" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Confirm Password</label>
                <input type="password" name="password2" class="form-control" placeholder="Repeat password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 btn-lg">
                <i class="fas fa-user-plus me-2"></i>Register
            </button>
        </form>
        <p class="text-center mt-3 mb-0">
            Already have an account? <a href="{% url 'login' %}">Login here</a>
        </p>
    </div>
</div>
{% endblock %}
