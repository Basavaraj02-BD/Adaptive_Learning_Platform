{% extends 'base.html' %}
{% block title %}Add Module{% endblock %}
{% block content %}
<div class="container py-4" style="max-width:600px;">
    <div class="card p-4">
        <h4 class="fw-bold mb-4">
            <i class="fas fa-plus me-2 text-warning"></i>Add Module to "{{ course.title }}"
        </h4>
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-semibold">Module Title</label>
                <input type="text" name="title" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Description</label>
                <textarea name="description" class="form-control" rows="3"></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Order Number</label>
                <input type="number" name="order" class="form-control" value="1">
            </div>
            <button type="submit" class="btn btn-warning w-100 btn-lg">
                <i class="fas fa-plus me-2"></i>Add Module
            </button>
        </form>
    </div>
</div>
{% endblock %}
