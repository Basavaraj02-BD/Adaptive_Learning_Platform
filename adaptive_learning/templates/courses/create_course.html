{% extends 'base.html' %}
{% block title %}Create Course{% endblock %}
{% block content %}
<div class="container py-4" style="max-width:650px;">
    <div class="card p-4">
        <h4 class="fw-bold mb-4">
            <i class="fas fa-plus me-2 text-primary"></i>Create New Course
        </h4>
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-semibold">Course Title</label>
                <input type="text" name="title" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Description</label>
                <textarea name="description" class="form-control" rows="4" required></textarea>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">Level</label>
                    <select name="level" class="form-select">
                        <option value="beginner">Beginner</option>
                        <option value="intermediate">Intermediate</option>
                        <option value="advanced">Advanced</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">Price (₹)</label>
                    <input type="number" name="price" class="form-control" value="0">
                </div>
            </div>
            <div class="mb-3 form-check">
                <input type="checkbox" name="is_free" class="form-check-input" id="isFree" checked>
                <label class="form-check-label" for="isFree">This course is FREE</label>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Thumbnail Image</label>
                <input type="file" name="thumbnail" class="form-control" accept="image/*">
            </div>
            <button type="submit" class="btn btn-primary w-100 btn-lg">
                <i class="fas fa-check me-2"></i>Create Course
            </button>
        </form>
    </div>
</div>
{% endblock %}
